services:
  database:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cervecerdas}
      POSTGRES_USER: ${POSTGRES_USER:-cervecerdas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-locally}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cervecerdas_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cervecerdas}:${POSTGRES_PASSWORD:-change-me-locally}@database:5432/${POSTGRES_DB:-cervecerdas}
      AUTH_SECRET: ${AUTH_SECRET:-development-only-secret-change-before-deploying}
      NEXTAUTH_SECRET: ${AUTH_SECRET:-development-only-secret-change-before-deploying}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      SESSION_MAX_AGE_SECONDS: ${SESSION_MAX_AGE_SECONDS:-604800}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - cervecerdas_network

volumes:
  postgres_data:

networks:
  cervecerdas_network:
    driver: bridge
